name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/mobile/**"
      - "scripts/run-sprint7e-mobile-uat.mjs"
      - "src/app/api/**"
      - "src/lib/crm/quotations-service.ts"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "scripts/run-sprint7e-mobile-uat.mjs"

jobs:
  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  mobile-api-uat:
    runs-on: ubuntu-latest
    needs: mobile-typecheck
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Mobile HTTP UAT (staging secrets required)
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GATE_BASE_URL: ${{ secrets.GATE_BASE_URL }}
          GATE_TEST_PASSWORD: ${{ secrets.GATE_TEST_PASSWORD }}
          GATE_SALES_EMAIL: ${{ secrets.GATE_SALES_EMAIL }}
          GATE_ADMIN_EMAIL: ${{ secrets.GATE_ADMIN_EMAIL }}
        run: node scripts/run-sprint7e-mobile-uat.mjs

  maestro-validate:
    runs-on: ubuntu-latest
    needs: mobile-typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Validate Maestro flow files exist
        run: |
          test -f apps/mobile/maestro/flows/01-login.yaml
          test -f apps/mobile/maestro/flows/03-quotations-list.yaml
          echo "Maestro flows present (device run requires Maestro CLI / Cloud)"
